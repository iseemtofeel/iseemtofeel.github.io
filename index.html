<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Buttons</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div id="quote" class="quote">Click Me!</div>

    <div id="button-container" class="grid" style="display: none;">
      <div class="item" data-text="The physical, material world shapes who we are...">Button 1</div>
      <div class="item" data-text="I can't go on. I'll go on...">Button 2</div>
      <div class="item" data-text="The world breaks everyone...">Button 3</div>
      <div class="item" data-text="I see now that hell isn’t other people...">Button 4</div>
    </div>

    <div id="secondary-buttons" class="grid" style="display: none;">
      <div class="item" data-text="The more a man is seen, the less he exists...">Button 5</div>
      <div class="item" data-text="What I feel is a vast emptiness...">Button 6</div>
    </div>

    <div class="output"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
