<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Buttons</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <button id="btn1" class="btn" onclick="displayText(1)">The exhaust consume as the spiral goes</button>
    <button id="btn2" class="btn" onclick="displayText(2)">I can no longer see or believe this life I lead</button>
    <button id="btn3" class="btn" onclick="displayText(3)">I could never imagine one life is worth hundreds lost</button>
    <button id="btn4" class="btn" onclick="displayText(4)">Nobody seems to understand but I seem to feel</button>
    <button id="btn5" class="btn" onclick="displayText(5)">Seem</button>
    <button id="btn6" class="btn" onclick="displayText(6)">Feel</button>

    <div id="text-container" class="text-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
